app-id: me.sanchezrodriguez.passes
command: passes

# * https://docs.flatpak.org/en/latest/available-runtimes.html#gnome
# * https://release.gnome.org/calendar/#releases
# * https://flathub.org/en/apps/org.gnome.Platform
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=wayland

cleanup:
  - /include
  - /lib/cmake
  - /share/man
cleanup-commands:
  - python3 -m compileall --invalidation-mode=unchecked-hash /app

modules:
  - name: zint
    buildsystem: cmake
    cleanup:
      - /bin/zint
    sources:
      - type: git
        url: https://github.com/zint/zint.git
        tag: 2.16.0
        commit: 55541e139e62b9209b71cd9b0ba9010cec28b1d9
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

  - name: passes
    builddir: true
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/pablo-s/passes.git
        tag: v0.11
        commit: 6bd1a8aed7a53a6f1c66e4ad0d9391edbe5b3b5f
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$
